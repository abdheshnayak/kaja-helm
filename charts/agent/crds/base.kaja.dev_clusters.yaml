---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: clusters.base.kaja.dev
spec:
  group: base.kaja.dev
  names:
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    singular: cluster
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.statusEmoji
      name: Status
      type: string
    - jsonPath: .status.health
      name: Health
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Cluster is the Schema for the clusters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterSpec defines the desired state of Cluster
            properties:
              clusterRef:
                description: ClusterRef references the cluster where this resource
                  is deployed
                type: string
              description:
                description: Description provides additional context about the resource
                type: string
              displayName:
                description: DisplayName is a human-readable name for the resource
                type: string
              https:
                description: HTTPS configures the cluster's automatic-HTTPS behaviour.
                properties:
                  acmeEmail:
                    description: ACMEEmail is the contact email for Let's Encrypt
                      account registration.
                    type: string
                  autoBootstrap:
                    description: AutoBootstrap allows the agent to install ingress-nginx
                      + cert-manager without UI confirmation.
                    type: boolean
                  disabled:
                    description: |-
                      Disabled fully disables automatic HTTPS reconciliation.
                      No omitempty on json so that "disabled: false" is always serialised; omitting
                      false would leave the old true value in place when copySpec replaces the spec.
                    type: boolean
                  preferredIssuer:
                    description: PreferredIssuer pins a specific ClusterIssuer name
                      (overrides auto-pick).
                    type: string
                type: object
              projectRef:
                description: ProjectRef references the project this resource belongs
                  to
                type: string
            type: object
          status:
            description: ClusterStatus defines the observed state of Cluster
            properties:
              checksCompleted:
                type: string
              conditions:
                description: Conditions represent the current state of the Cluster
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              https:
                description: HTTPS provides the observed state of automatic HTTPS
                  in the cluster.
                properties:
                  activeIssuer:
                    description: |-
                      ActiveIssuer is the ClusterIssuer name routes should use. Empty if none yet.
                      Stage (a) leaves this empty — the picker in stage (b) will set it.
                    type: string
                  candidates:
                    description: Candidates is the list of discovered ClusterIssuers
                      in the cluster.
                    items:
                      description: IssuerCandidate describes a ClusterIssuer discovered
                        in the cluster.
                      properties:
                        email:
                          description: Email is the ACME account contact email.
                          type: string
                        ingressClass:
                          description: IngressClass declared on the issuer's http01
                            solver.
                          type: string
                        isAcme:
                          description: IsACME indicates the issuer is ACME-based (false
                            → likely private CA, ignore for public hosts).
                          type: boolean
                        name:
                          description: Name of the ClusterIssuer.
                          type: string
                        ready:
                          description: Ready reflects the Ready condition on the ClusterIssuer.
                          type: boolean
                        server:
                          description: Server is the ACME server URL (empty for non-ACME
                            issuers).
                          type: string
                        solverType:
                          description: 'SolverType: "http01" | "dns01" | "".'
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  certManager:
                    description: CertManager observed state.
                    properties:
                      installed:
                        description: Installed indicates whether cert-manager is present
                          in the cluster.
                        type: boolean
                      namespace:
                        description: Namespace where cert-manager is installed.
                        type: string
                      version:
                        description: Version of cert-manager, if detected.
                        type: string
                    type: object
                  ingressClass:
                    description: IngressClass resolved from the detected controller
                      (e.g. "nginx", "traefik").
                    type: string
                  pendingDecision:
                    description: |-
                      PendingDecision is populated only when human input is required.
                      Stage (a) leaves this nil.
                    properties:
                      options:
                        description: Options the user can choose from (issuer names,
                          install actions, etc.).
                        items:
                          type: string
                        type: array
                      plan:
                        description: Plan is a human-readable preview of what the
                          agent will do once the decision is approved.
                        type: string
                      question:
                        description: Question identifier — e.g. "missing_acme_email"
                          | "ambiguous_issuer" | "no_ingress_controller".
                        type: string
                    required:
                    - question
                    type: object
                  phase:
                    description: 'Phase: Discovering | Ready | NeedsApproval | Installing
                      | Failed'
                    type: string
                  reason:
                    description: 'Reason: Reused | Created | Provided | None'
                    type: string
                type: object
              message:
                type: string
              network:
                description: Network provides a summary of the cluster networking
                properties:
                  detectedIngressController:
                    description: |-
                      DetectedIngressController is the name of the ingress controller found (e.g. "traefik", "ingress-nginx").
                      Empty if none detected; used to show which controller is in use.
                    type: string
                  detectedIngressControllerVersion:
                    description: DetectedIngressControllerVersion is the version of
                      the detected ingress controller (from container image tag).
                    type: string
                  hasCertManager:
                    description: HasCertManager indicates if cert-manager is detected
                    type: boolean
                  hasIngressController:
                    description: HasIngressController indicates if an ingress controller
                      is detected
                    type: boolean
                  loadBalancerIps:
                    description: LoadBalancerIPs is the list of public IPs or hostnames
                      for the cluster
                    items:
                      type: string
                    type: array
                  podCidrs:
                    description: PodCIDRs is the list of CIDRs used for pods
                    items:
                      type: string
                    type: array
                  serviceCidrs:
                    description: ServiceCIDRs is the list of CIDRs used for services
                    items:
                      type: string
                    type: array
                  tunnelIngressTarget:
                    description: |-
                      TunnelIngressTarget is the cluster-internal URL for the tunnel to route traffic to (e.g. http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80).
                      Set by the cluster reconciler when an ingress controller is detected; used by the console to configure the Cloudflare tunnel.
                    type: string
                type: object
              nodes:
                description: Nodes provides a summary of the cluster nodes
                properties:
                  allocatable:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Allocatable represents the total resources allocatable
                      of all nodes
                    type: object
                  architectures:
                    description: Architectures tracks the architectures of the nodes
                    items:
                      type: string
                    type: array
                  capacity:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Capacity represents the total resources capacity
                      of all nodes
                    type: object
                  count:
                    description: Count is the total number of nodes
                    type: integer
                  items:
                    description: Items holds per-node details for UI display (like
                      PodInfo for env/containerapp)
                    items:
                      description: NodeInfo holds per-node details for display (e.g.
                        on Cluster overview).
                      properties:
                        architecture:
                          description: Architecture is the node architecture (e.g.
                            amd64, arm64)
                          type: string
                        name:
                          description: Name is the node name
                          type: string
                        ready:
                          description: Ready indicates if the node is Ready (from
                            NodeReady condition)
                          type: boolean
                        version:
                          description: Version is the Kubernetes version (kubelet)
                            reported by the node
                          type: string
                      required:
                      - name
                      - ready
                      type: object
                    type: array
                  osImages:
                    description: OSImages tracks the OS images of the nodes
                    items:
                      type: string
                    type: array
                  versions:
                    description: Versions tracks the Kubernetes versions of the nodes
                    items:
                      type: string
                    type: array
                required:
                - count
                type: object
              pods:
                description: Pods holds basic pod details for display (e.g. ContainerApp
                  overview). Optional.
                items:
                  description: |-
                    PodInfo holds basic pod details for display (e.g. on ContainerApp/HelmApp overview).
                    Used when a resource has associated pods (e.g. ContainerApp's deployment, Helm release pods).
                    Reason and Message surface container waiting/terminated state for debugging (e.g. ImagePullBackOff).
                  properties:
                    message:
                      type: string
                    name:
                      type: string
                    phase:
                      type: string
                    ready:
                      type: string
                    reason:
                      type: string
                    restartCount:
                      format: int32
                      type: integer
                  required:
                  - name
                  - phase
                  - ready
                  - restartCount
                  type: object
                type: array
              services:
                description: Services holds service details for the resource (e.g.
                  HelmApp release services) for domain/route backend selection. Optional.
                items:
                  description: |-
                    ServiceInfo holds basic service details for display and for selecting domain backend (e.g. HelmApp domain).
                    Used when a resource has associated services (e.g. Helm release services).
                  properties:
                    name:
                      type: string
                    ports:
                      items:
                        description: ServicePortInfo holds a single port exposed by
                          a service (for domain/route backend selection).
                        properties:
                          name:
                            type: string
                          port:
                            format: int32
                            type: integer
                          protocol:
                            type: string
                        required:
                        - port
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
              status:
                type: string
              statusEmoji:
                type: string
              steps:
                items:
                  properties:
                    message:
                      type: string
                    name:
                      type: string
                    status:
                      type: string
                  required:
                  - message
                  - name
                  - status
                  type: object
                type: array
              tools:
                description: Tools observes the status of various tools in the cluster
                items:
                  description: ToolStatus defines the observed state of a tool
                  properties:
                    installed:
                      description: Installed indicates if the tool is currently installed/detected
                      type: boolean
                    message:
                      description: Message provides additional information about the
                        tool status
                      type: string
                    name:
                      description: Name of the tool
                      type: string
                    version:
                      description: Version of the installed tool (if detectable)
                      type: string
                  required:
                  - installed
                  - name
                  type: object
                type: array
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
