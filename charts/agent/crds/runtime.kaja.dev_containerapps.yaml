---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: containerapps.runtime.kaja.dev
spec:
  group: runtime.kaja.dev
  names:
    kind: ContainerApp
    listKind: ContainerAppList
    plural: containerapps
    singular: containerapp
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.statusEmoji
      name: Status
      type: string
    - jsonPath: .status.checksCompleted
      name: Checks
      type: string
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: ContainerApp is the Schema for the containerapps API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ContainerApp
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: Annotations for additional metadata
                type: object
              autoscaling:
                description: |-
                  Autoscaling configures horizontal pod autoscaling (HPA). When set, the controller
                  creates an HPA and leaves deployment replicas unset so HPA controls scaling.
                  When nil, HPA is disabled (must be serialized as null so cluster resource is updated).
                properties:
                  maxReplicas:
                    description: MaxReplicas is the maximum number of replicas
                    format: int32
                    type: integer
                  minReplicas:
                    description: MinReplicas is the minimum number of replicas (defaults
                      to 1 if not set)
                    format: int32
                    type: integer
                  targetCPUUtilizationPercentage:
                    description: TargetCPUUtilizationPercentage is the target average
                      CPU utilization (e.g. 80 for 80%)
                    format: int32
                    type: integer
                  targetMemoryUtilizationPercentage:
                    description: TargetMemoryUtilizationPercentage is the target average
                      memory utilization (e.g. 80 for 80%)
                    format: int32
                    type: integer
                type: object
              clusterRef:
                description: ClusterRef references the cluster where this resource
                  is deployed
                type: string
              description:
                description: Description provides additional context about the resource
                type: string
              displayName:
                description: DisplayName is a human-readable name for the resource
                type: string
              env:
                description: |-
                  Env defines environment variables for the container.
                  When empty, must be serialized so cluster resource is updated on clear.
                items:
                  description: EnvVar represents an environment variable
                  properties:
                    name:
                      type: string
                    value:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              image:
                description: Image specifies the container image to run
                type: string
              imagePullSecrets:
                description: |-
                  ImagePullSecrets lists secret names used for pulling container images (e.g. private registry).
                  Secrets must exist in the same namespace; use Secret type kubernetes.io/dockerconfigjson for registry auth.
                items:
                  description: LocalObjectReference references an object by name (same
                    namespace).
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              labels:
                additionalProperties:
                  type: string
                description: Labels for additional metadata
                type: object
              livenessProbe:
                description: LivenessProbe defines the liveness probe
                properties:
                  failureThreshold:
                    format: int32
                    type: integer
                  initialDelaySeconds:
                    format: int32
                    type: integer
                  path:
                    description: Path is the HTTP path to probe (e.g. /health). When
                      empty, the probe is disabled.
                    type: string
                  periodSeconds:
                    format: int32
                    type: integer
                  port:
                    description: Port is the container port to probe. Defaults to
                      the app's first port when unset.
                    format: int32
                    type: integer
                  successThreshold:
                    format: int32
                    type: integer
                  timeoutSeconds:
                    format: int32
                    type: integer
                type: object
              paused:
                description: Paused when true scales the app to zero. When false,
                  normal replicas/autoscaling applies.
                type: boolean
              ports:
                description: Ports defines the ports exposed by the container
                items:
                  description: ContainerPort represents a port mapping
                  properties:
                    containerPort:
                      format: int32
                      type: integer
                    name:
                      type: string
                    protocol:
                      type: string
                  required:
                  - containerPort
                  type: object
                type: array
              projectRef:
                description: ProjectRef references the project this resource belongs
                  to
                type: string
              readinessProbe:
                description: ReadinessProbe defines the readiness probe
                properties:
                  failureThreshold:
                    format: int32
                    type: integer
                  initialDelaySeconds:
                    format: int32
                    type: integer
                  path:
                    description: Path is the HTTP path to probe (e.g. /health). When
                      empty, the probe is disabled.
                    type: string
                  periodSeconds:
                    format: int32
                    type: integer
                  port:
                    description: Port is the container port to probe. Defaults to
                      the app's first port when unset.
                    format: int32
                    type: integer
                  successThreshold:
                    format: int32
                    type: integer
                  timeoutSeconds:
                    format: int32
                    type: integer
                type: object
              replicas:
                default: 1
                description: Replicas specifies the number of desired replicas
                format: int32
                type: integer
              resources:
                description: Resources defines resource requirements and limits
                properties:
                  limits:
                    additionalProperties:
                      type: string
                    type: object
                  requests:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              secretRefs:
                description: |-
                  SecretRefs references secrets for env or volume use. Name is the secret name in the same namespace.
                  UseType "env" injects all secret keys as env vars; "volume" mounts the secret at MountPath.
                items:
                  description: ContainerAppSecretRef references a secret and how to
                    use it (env or volume mount).
                  properties:
                    mountPath:
                      description: MountPath is required when UseType is "volume";
                        path where the secret is mounted
                      type: string
                    name:
                      description: Name is the secret name in the same namespace
                      type: string
                    useType:
                      description: UseType is "env" (inject keys as env vars) or "volume"
                        (mount as files)
                      type: string
                  required:
                  - name
                  - useType
                  type: object
                type: array
              sidecars:
                description: |-
                  Sidecars defines additional containers that run in the same pod as the main app (e.g. proxies, log shippers).
                  When nil or empty, no sidecars (must be serialized so cluster resource is updated on clear).
                items:
                  description: Sidecar defines an auxiliary container running in the
                    same pod as the main app container
                  properties:
                    env:
                      description: Env defines environment variables for the sidecar
                      items:
                        description: EnvVar represents an environment variable
                        properties:
                          name:
                            type: string
                          value:
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    image:
                      description: Image is the container image to run
                      type: string
                    name:
                      description: Name is the container name (must be unique within
                        the pod)
                      type: string
                    ports:
                      description: Ports defines the ports exposed by the sidecar
                      items:
                        description: ContainerPort represents a port mapping
                        properties:
                          containerPort:
                            format: int32
                            type: integer
                          name:
                            type: string
                          protocol:
                            type: string
                        required:
                        - containerPort
                        type: object
                      type: array
                    resources:
                      description: Resources defines resource requirements and limits
                        for the sidecar
                      properties:
                        limits:
                          additionalProperties:
                            type: string
                          type: object
                        requests:
                          additionalProperties:
                            type: string
                          type: object
                      type: object
                  required:
                  - image
                  - name
                  type: object
                type: array
              startCommand:
                description: |-
                  StartCommand overrides the process the container runs, as a single shell command
                  (e.g. "npx serve dist -l $PORT"). Only the container's args are overridden — the
                  image's own entrypoint is left untouched, so buildpack-built images still run through
                  the CNB launcher (preserving its env/PATH setup) instead of bypassing it. Needed for
                  buildpack-built images with no default process type (e.g. a Vite/static app with no
                  Procfile or "start" script), which otherwise fail at launch with "determine start
                  command: when there is no default process a command is required".
                type: string
              startupProbe:
                description: |-
                  StartupProbe indicates whether the container has started. If set, liveness and readiness
                  are not run until it succeeds. Useful for slow-starting containers.
                properties:
                  failureThreshold:
                    format: int32
                    type: integer
                  initialDelaySeconds:
                    format: int32
                    type: integer
                  path:
                    description: Path is the HTTP path to probe (e.g. /health). When
                      empty, the probe is disabled.
                    type: string
                  periodSeconds:
                    format: int32
                    type: integer
                  port:
                    description: Port is the container port to probe. Defaults to
                      the app's first port when unset.
                    format: int32
                    type: integer
                  successThreshold:
                    format: int32
                    type: integer
                  timeoutSeconds:
                    format: int32
                    type: integer
                type: object
            required:
            - image
            type: object
          status:
            description: status defines the observed state of ContainerApp
            properties:
              checksCompleted:
                type: string
              events:
                description: Events holds recent Warning events for the resource's
                  workload, collected best-effort. Optional.
                items:
                  description: |-
                    EventInfo holds a recent Warning Kubernetes event related to the resource's workload
                    (Deployment/ReplicaSet/Pod), collected best-effort. Powers a human-readable health reason
                    and (later) an events feed. Optional.
                  properties:
                    count:
                      format: int32
                      type: integer
                    lastSeen:
                      type: string
                    message:
                      type: string
                    object:
                      type: string
                    reason:
                      type: string
                  required:
                  - reason
                  type: object
                type: array
              message:
                type: string
              phase:
                description: |-
                  Phase is the derived, honest workload health phase (e.g. Running, Crashing, ImageError) computed
                  from the actual Deployment + pod state — the developer-facing headline. See DeriveWorkloadHealth.
                  The apply-step Checks above remain secondary "apply progress" detail, not the headline.
                type: string
              pods:
                description: Pods holds basic pod details for display (e.g. ContainerApp
                  overview). Optional.
                items:
                  description: |-
                    PodInfo holds basic pod details for display (e.g. on ContainerApp/HelmApp overview).
                    Used when a resource has associated pods (e.g. ContainerApp's deployment, Helm release pods).
                    Reason and Message surface container waiting/terminated state for debugging (e.g. ImagePullBackOff).
                  properties:
                    message:
                      type: string
                    name:
                      type: string
                    phase:
                      type: string
                    ready:
                      type: string
                    reason:
                      type: string
                    restartCount:
                      format: int32
                      type: integer
                  required:
                  - name
                  - phase
                  - ready
                  - restartCount
                  type: object
                type: array
              reason:
                description: Reason is a plain-language explanation of Phase (e.g.
                  "Couldn't pull your image.").
                type: string
              services:
                description: Services holds service details for the resource (e.g.
                  HelmApp release services) for domain/route backend selection. Optional.
                items:
                  description: |-
                    ServiceInfo holds basic service details for display and for selecting domain backend (e.g. HelmApp domain).
                    Used when a resource has associated services (e.g. Helm release services).
                  properties:
                    name:
                      type: string
                    ports:
                      items:
                        description: ServicePortInfo holds a single port exposed by
                          a service (for domain/route backend selection).
                        properties:
                          name:
                            type: string
                          port:
                            format: int32
                            type: integer
                          protocol:
                            type: string
                        required:
                        - port
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
              status:
                type: string
              statusEmoji:
                type: string
              steps:
                items:
                  properties:
                    message:
                      type: string
                    name:
                      type: string
                    status:
                      type: string
                  required:
                  - message
                  - name
                  - status
                  type: object
                type: array
            required:
            - status
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
