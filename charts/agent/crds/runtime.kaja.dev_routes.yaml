                  - name
                  - phase
                  - ready
                  - restartCount
                  type: object
                type: array
              services:
                description: Services holds service details for the resource (e.g.
                  HelmApp release services) for domain/route backend selection. Optional.
                items:
                  description: |-
                    ServiceInfo holds basic service details for display and for selecting domain backend (e.g. HelmApp domain).
                    Used when a resource has associated services (e.g. Helm release services).
                  properties:
                    name:
                      type: string
                    ports:
                      items:
                        description: ServicePortInfo holds a single port exposed by
                          a service (for domain/route backend selection).
                        properties:
                          name:
                            type: string
                          port:
                            format: int32
                            type: integer
                          protocol:
                            type: string
                        required:
                        - port
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
              status:
                type: string
              statusEmoji:
                type: string
              steps:
                items:
                  properties:
                    message:
                      type: string
                    name:
                      type: string
                    status:
                      type: string
                  required:
                  - message
                  - name
                  - status
                  type: object
                type: array
            required:
            - status
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
