---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: routes.runtime.kaja.dev
spec:
  group: runtime.kaja.dev
  names:
    kind: Route
    listKind: RouteList
    plural: routes
    singular: route
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Route is the Schema for the routes API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Route
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: Annotations specifies additional annotations to add to
                  the Ingress
                type: object
              backend:
                description: Backend specifies the backend service for the route
                properties:
                  serviceName:
                    description: ServiceName specifies the name of the backend service
                    type: string
                  servicePort:
                    description: |-
                      ServicePort specifies the numeric port of the backend service.
                      Ignored when ServicePortName is provided.
                    format: int32
                    type: integer
                  servicePortName:
                    description: |-
                      ServicePortName specifies the named port of the backend service (e.g. "http").
                      When set this takes precedence over ServicePort, making the Ingress resilient
                      to port-number changes in the ContainerApp.
                    type: string
                required:
                - serviceName
                type: object
              backendNamespace:
                description: BackendNamespace is the namespace where the backend Service
                  lives. When set, the Ingress is created in this namespace so it
                  can reference the Service (e.g. for HelmApp routes where the release
                  is in a different namespace than the Route).
                type: string
              clusterRef:
                description: ClusterRef references the cluster where this resource
                  is deployed
                type: string
              description:
                description: Description provides additional context about the resource
                type: string
              displayName:
                description: DisplayName is a human-readable name for the resource
                type: string
              environmentRef:
                description: EnvironmentRef references the environment this resource
                  belongs to
                type: string
              host:
                description: Host specifies the domain name for the route
                type: string
              labels:
                additionalProperties:
                  type: string
                description: Labels specifies additional labels to add to the Ingress
                type: object
              path:
                description: Path specifies the URL path for the route
                type: string
              rules:
                description: Rules specifies the routing rules for the route
                items:
                  description: RouteRule specifies a routing rule for a route
                  properties:
                    backend:
                      description: Backend specifies the backend service for this
                        rule
                      properties:
                        serviceName:
                          description: ServiceName specifies the name of the backend
                            service
                          type: string
                        servicePort:
                          description: |-
                            ServicePort specifies the numeric port of the backend service.
                            Ignored when ServicePortName is provided.
                          format: int32
                          type: integer
                        servicePortName:
                          description: |-
                            ServicePortName specifies the named port of the backend service (e.g. "http").
                            When set this takes precedence over ServicePort, making the Ingress resilient
                            to port-number changes in the ContainerApp.
                          type: string
                      required:
                      - serviceName
                      type: object
                    host:
                      description: Host specifies the domain name for this rule
                      type: string
                    path:
                      description: Path specifies the URL path for this rule
                      type: string
                  type: object
                type: array
              tls:
                description: TLS specifies the TLS configuration for the route
                properties:
                  secretName:
                    description: SecretName specifies the name of the TLS secret containing
                      the certificate
                    type: string
                required:
                - secretName
                type: object
            required:
            - backend
            - host
            type: object
          status:
            description: status defines the observed state of Route
            properties:
              checksCompleted:
                type: string
              message:
                type: string
              pods:
                description: Pods holds basic pod details for display (e.g. ContainerApp
                  overview). Optional.
                items:
                  description: |-
                    PodInfo holds basic pod details for display (e.g. on ContainerApp/HelmApp overview).
