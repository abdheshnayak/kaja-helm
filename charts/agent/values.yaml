# Default values for agent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
#
# ⚠️  Do NOT put real credentials here — this file is committed to version control.
#     Copy .values.yaml.example to .values.yaml and fill in your actual values.
#     .values.yaml is gitignored and loaded with: helm upgrade --install ... -f .values.yaml

replicaCount: 1

image:
  repository: ghcr.io/abdheshnayak/kaja-agent
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# RBAC configuration
rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# Environment variables for the agent
env:
  # Cluster identification — set a unique name for each cluster
  clusterId: ""
  # Agent authentication token — Required, obtain from the Kaja console
  agentToken: ""
  # gRPC server URL of the Kaja platform
  portServerUrl: "grpc.server.kaja.dev:443"
  # Use TLS for gRPC (recommended for production; set false for local dev / NodePort)
  grpcUseTls: true
  logLevel: "info"

# Webhook configuration
webhook:
  enabled: true
  # Run only the webhook server without controllers.
  webhookOnly: false
  certPath: "/tmp/k8s-webhook-server/serving-certs"
  certName: "tls.crt"
  certKey: "tls.key"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
