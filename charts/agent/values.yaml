# Default values for agent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
#
# ⚠️  Do NOT put real credentials here — this file is committed to version control.
#     Copy .values.yaml.example to .values.yaml and fill in your actual values.
#     .values.yaml is gitignored and loaded with: helm upgrade --install ... -f .values.yaml

replicaCount: 1

image:
  repository: ghcr.io/abdheshnayak/kaja-agent
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# RBAC configuration
rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# Environment variables for the agent
env:
  # Agent authentication token — required, obtain from the Kaja console.
  # The platform resolves the cluster identity from this token at login,
  # so no cluster name/id needs to be configured here.
  agentToken: ""
  # agentId: optional override that scopes resource names/namespaces. Set only
  # when running multiple agents on the same Kubernetes cluster.
  agentId: ""
  # gRPC server URL of the Kaja platform
  portServerUrl: "grpc.server.kaja.dev:443"
  # Use TLS for gRPC (recommended for production; set false for local dev / NodePort)
  grpcUseTls: true
  logLevel: "info"
  # Automatic HTTPS. When true, the agent creates a Let's Encrypt PRODUCTION ClusterIssuer
  # using the cert-manager that the agent already requires (for its admission webhook), so
  # routes get trusted certificates with no manual TLS secrets. Requires an ingress
  # controller to already be present in the cluster.
  autoHttps: false
  # Contact email for the Let's Encrypt account. Required when autoHttps is true.
  acmeEmail: ""
  # Self-hosted gateway (docs/self-hosted-gateway) agent-plane address. Empty
  # disables the gateway tunnel component entirely, leaving the private cluster
  # unreachable — the gateway is the only inbound path (the Cloudflare tunnel
  # has been removed). Defaults to this deployment's gateway; override
  # per-install if you're running your own gateway elsewhere.
  # NOTE: as of this writing gateway.kaja.dev resolves through Cloudflare's
  # proxy, which doesn't forward arbitrary TCP ports (7000 included) — that
  # DNS record needs to point directly (unproxied) at the gateway's node for
  # this default to actually work. Don't fall back to a raw IP here even
  # temporarily; fix the DNS record instead — IPs on this node can change.
  gatewayEndpoint: "gateway.kaja.dev:7000"
  # Skip verifying the gateway's cert on the agent-plane TLS handshake.
  # Stays opt-in per-install rather than a chart default: the gateway
  # currently self-signs its :7000 cert (TODO in helms/gateway/.values.yaml),
  # so today every real install needs this set true to connect at all — but
  # baking that into the chart's default would silently weaken TLS for any
  # future install once a real cert is added there. Set true explicitly
  # (e.g. via --set or your own .values.yaml) until that TODO is resolved.
  gatewayTLSInsecureSkipVerify: false

# Webhook configuration
webhook:
  enabled: true
  # Run only the webhook server without controllers.
  webhookOnly: false
  # Webhook server port (must be unique per agent if multiple agents share a cluster)
  port: 9443
  # Health probe bind address (must be unique per agent if co-located)
  healthProbeAddr: ":8081"
  certPath: "/tmp/k8s-webhook-server/serving-certs"
  certName: "tls.crt"
  certKey: "tls.key"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
