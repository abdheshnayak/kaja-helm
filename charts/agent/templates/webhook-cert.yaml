apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: kaja
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: webhook-server-cert
  namespace: kaja
spec:
  secretName: webhook-server-cert
  dnsNames:
  - agent.kaja.svc
  - agent.kaja.svc.cluster.local
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
