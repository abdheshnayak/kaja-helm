{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agent.fullname" . }}-role
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
- nonResourceURLs: ["*"]
  verbs: ["*"]

# rules:
# - apiGroups:
#   - base.kaja.dev
#   resources:
#   - configs
#   - domains
#   - environments
#   - secrets
#   verbs:
