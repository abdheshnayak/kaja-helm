apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agent.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.webhook.enabled .Values.webhook.webhookOnly }}
          command: ["./operator-controller"]
          args:
            {{- if .Values.webhook.enabled }}
            - --enable-webhooks
            {{- end }}
            {{- if .Values.webhook.webhookOnly }}
            - --webhook-only
            {{- end }}
            {{- if .Values.webhook.certPath }}
            - --webhook-cert-path={{ .Values.webhook.certPath }}
            {{- end }}
            {{- if .Values.webhook.certName }}
            - --webhook-cert-name={{ .Values.webhook.certName }}
            {{- end }}
            {{- if .Values.webhook.certKey }}
            - --webhook-cert-key={{ .Values.webhook.certKey }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if or .Values.webhook.enabled .Values.webhook.webhookOnly }}
            - name: webhook
              containerPort: 9443
              protocol: TCP
            {{- end }}
          env:
            - name: CLUSTER_ID
              value: {{ required "env.clusterId is required when installing the agent chart" .Values.env.clusterId | quote }}
            - name: AGENT_TOKEN
              value: {{ required "env.agentToken is required when installing the agent chart" .Values.env.agentToken | quote }}
            {{- if .Values.env.portServerUrl }}
            - name: PORT_SERVER_URL
              value: {{ .Values.env.portServerUrl | quote }}
            {{- end }}
            {{- if .Values.env.logLevel }}
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - "./operator-controller"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pgrep
                - -f
                - "./operator-controller"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.webhook.enabled .Values.webhook.webhookOnly }}
          volumeMounts:
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if or .Values.webhook.enabled .Values.webhook.webhookOnly }}
      volumes:
        - name: webhook-cert
          secret:
            secretName: webhook-server-cert
      {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
